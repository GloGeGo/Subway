<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers 2D - Gelişmiş</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        canvas {
            background: linear-gradient(to bottom, #16213e 0%, #0f3460 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 10px;
            border: 4px solid #e94560;
        }
        #game-container {
            position: relative;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            pointer-events: none;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(22, 33, 62, 0.95);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 2px solid #e94560;
            box-shadow: 0 0 20px #e94560;
        }
        button {
            margin-top: 15px;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            background-color: #e94560;
            color: white;
            border-radius: 8px;
            transition: 0.2s;
        }
        button:hover {
            background-color: #ff6b81;
            transform: scale(1.05);
        }
        .stats {
            font-size: 20px;
            margin: 5px 0;
        }
        .gold { color: #f1c40f; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="360" height="600"></canvas>
    <div id="ui-layer">
        <div class="stats">Skor: <span id="scoreText">0</span></div>
        <div class="stats gold">Altın: <span id="coinText">0</span></div>
        <div class="stats" style="font-size:14px; color:#bdc3c7;">En Yüksek: <span id="highScoreText">0</span></div>
    </div>
    
    <div id="game-over">
        <h1 style="margin-top:0; color:#e94560;">YAKALANDIN!</h1>
        <p class="stats">Skor: <span id="final-score">0</span></p>
        <p class="stats gold">Toplanan Altın: <span id="final-coins">0</span></p>
        <button onclick="resetGame()">Tekrar Koş!</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    // UI Elementleri
    const gameOverScreen = document.getElementById("game-over");
    const scoreText = document.getElementById("scoreText");
    const coinText = document.getElementById("coinText");
    const highScoreText = document.getElementById("highScoreText");
    const finalScoreText = document.getElementById("final-score");
    const finalCoinsText = document.getElementById("final-coins");

    // Oyun Değişkenleri
    let frames = 0;
    let score = 0;
    let coinsCollected = 0;
    let highScore = localStorage.getItem("subwayHighScore") || 0;
    highScoreText.innerText = highScore;
    
    let gameActive = true;
    let baseSpeed = 5;
    let trackOffset = 0;

    // Şeritler (X Koordinatları: Sol, Orta, Sağ)
    const lanes = [60, 180, 300]; 

    // Oyuncu Objesi
    const player = {
        lane: 1,
        y: 480,
        width: 40,
        height: 50,
        color: "#00d2d3",
        isJumping: false,
        jumpTimer: 0,
        jumpDuration: 40, // Kaç frame havada kalacak
        scale: 1
    };

    let entities = []; // Altınlar ve Engeller
    let particles = []; // Hız çizgileri

    // Tuş Kontrolleri
    document.addEventListener("keydown", function(event) {
        if (!gameActive) {
            if(event.key === "Enter" || event.key === " ") resetGame();
            return;
        }

        // Sağa Sola Kayma
        if ((event.key === "ArrowLeft" || event.key === "a" || event.key === "A") && player.lane > 0) {
            player.lane--;
        } else if ((event.key === "ArrowRight" || event.key === "d" || event.key === "D") && player.lane < 2) {
            player.lane++;
        }
        
        // Zıplama
        if ((event.key === "ArrowUp" || event.key === "w" || event.key === "W" || event.key === " ") && !player.isJumping) {
            player.isJumping = true;
            player.jumpTimer = 0;
        }
    });

    // Varlık Üretici (Engeller ve Altınlar)
    function spawnEntities() {
        // Oyun hızlandıkça daha sık obje gelsin
        let spawnRate = Math.max(30, 70 - Math.floor(score / 200));
        
        if (frames % spawnRate === 0) {
            let randomLane = Math.floor(Math.random() * 3);
            let entityType = Math.random();

            if (entityType < 0.3) {
                // TREN (Uzun, ölümcül, zıplanamaz)
                entities.push({ type: "train", lane: randomLane, y: -150, width: 60, height: 150, color: "#ff4757" });
            } 
            else if (entityType < 0.6) {
                // BARİYER (Kısa, zıplanabilir)
                entities.push({ type: "barrier", lane: randomLane, y: -40, width: 50, height: 20, color: "#ffa502" });
            } 
            else {
                // ALTIN (3'lü sıra halinde gelir)
                for(let i=0; i<3; i++) {
                    entities.push({ type: "coin", lane: randomLane, y: -40 - (i*40), radius: 12, color: "#f1c40f", collected: false });
                }
            }
        }
    }

    // Arkaplan ve Rayları Çiz
    function drawBackground() {
        trackOffset = (trackOffset + baseSpeed) % 40;
        
        // Ray çizgileri
        ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
        ctx.lineWidth = 4;
        
        for(let i=0; i<3; i++) {
            let x = lanes[i];
            
            // Dikey Raylar
            ctx.beginPath(); ctx.moveTo(x - 25, 0); ctx.lineTo(x - 25, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x + 25, 0); ctx.lineTo(x + 25, canvas.height); ctx.stroke();
            
            // Yatay Tahtalar (Hareket hissi için)
            for(let y = trackOffset; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(x - 25, y);
                ctx.lineTo(x + 25, y);
                ctx.stroke();
            }
        }
    }

    // Oyuncuyu Çiz
    function drawPlayer() {
        let x = lanes[player.lane] - (player.width / 2);
        let currentWidth = player.width;
        let currentHeight = player.height;
        let yOffset = 0;

        // Zıplama Animasyonu Mantığı (Sinüs dalgası ile yumuşak kalkış ve iniş)
        if (player.isJumping) {
            player.jumpTimer++;
            // 0 ile PI arası sinüs (yarım daire)
            let jumpProgress = (player.jumpTimer / player.jumpDuration) * Math.PI; 
            let heightBoost = Math.sin(jumpProgress);
            
            player.scale = 1 + (heightBoost * 0.4); // Zıplayınca büyür (%40)
            yOffset = heightBoost * -40; // Biraz yukarı kalkar
            
            // Gölgelik (Zıpladığında yerde kalan gölge)
            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.beginPath();
            ctx.ellipse(lanes[player.lane], player.y + player.height - 10, 20 * (1-heightBoost*0.5), 8, 0, 0, Math.PI * 2);
            ctx.fill();

            if (player.jumpTimer >= player.jumpDuration) {
                player.isJumping = false;
                player.scale = 1;
            }
        }

        currentWidth *= player.scale;
        currentHeight *= player.scale;
        
        // Oyuncu Gövdesi
        ctx.fillStyle = player.color;
        ctx.shadowBlur = player.isJumping ? 20 : 10;
        ctx.shadowColor = player.color;
        
        // X koordinatını büyüme oranına göre merkeze al
        let drawX = lanes[player.lane] - (currentWidth / 2);
        ctx.fillRect(drawX, player.y + yOffset, currentWidth, currentHeight);
        
        ctx.shadowBlur = 0; // Gölgeyi diğer objeler için sıfırla
    }

    // Objeleri Yönet (Hareket, Çarpışma, Çizim)
    function handleEntities() {
        for (let i = 0; i < entities.length; i++) {
            let ent = entities[i];
            ent.y += baseSpeed;

            // Altın Çizimi
            if (ent.type === "coin" && !ent.collected) {
                ctx.fillStyle = ent.color;
                ctx.beginPath();
                ctx.arc(lanes[ent.lane], ent.y, ent.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // İçine küçük detay
                ctx.fillStyle = "#f39c12";
                ctx.beginPath();
                ctx.arc(lanes[ent.lane], ent.y, ent.radius - 4, 0, Math.PI * 2);
                ctx.fill();
            } 
            // Engel Çizimi
            else if (ent.type === "train" || ent.type === "barrier") {
                let x = lanes[ent.lane] - (ent.width / 2);
                
                ctx.fillStyle = ent.color;
                ctx.fillRect(x, ent.y, ent.width, ent.height);
                
                // Üzerine şeritler çizelim (Görsellik)
                ctx.fillStyle = "rgba(0,0,0,0.2)";
                if(ent.type === "barrier") {
                    ctx.fillRect(x, ent.y + 5, ent.width, 10);
                } else {
                    ctx.fillRect(x + 10, ent.y, 40, ent.height); // Trenin camı gibi
                }
            }

            // --- ÇARPIŞMA (COLLISION) KONTROLLERİ ---
            let isSameLane = (player.lane === ent.lane);
            let isOverlappingY = (player.y < ent.y + (ent.radius || ent.height) && player.y + player.height > ent.y);

            if (isSameLane && isOverlappingY) {
                if (ent.type === "coin" && !ent.collected) {
                    // Altın Toplama
                    ent.collected = true;
                    score += 50;
                    coinsCollected++;
                    updateUI();
                } 
                else if (ent.type === "train") {
                    // Trene çarparsan kesin ölüm
                    gameOver();
                } 
                else if (ent.type === "barrier") {
                    // Bariyerdeyken eğer zıplamıyorsan ölüm
                    if (!player.isJumping) {
                        gameOver();
                    }
                }
            }

            // Ekrandan Çıkanları Temizle
            if (ent.y > canvas.height) {
                entities.splice(i, 1);
                i--;
            }
        }
    }

    // Hız Çizgileri Efekti (Yanlardan akan çizgiler)
    function handleSpeedLines() {
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        if(Math.random() < 0.3) {
            particles.push({
                x: Math.random() > 0.5 ? Math.random() * 40 : canvas.width - Math.random() * 40,
                y: -20,
                length: 20 + Math.random() * 50
            });
        }
        
        for(let i=0; i<particles.length; i++) {
            let p = particles[i];
            p.y += baseSpeed * 2; // Çizgiler daha hızlı akar
            ctx.fillRect(p.x, p.y, 2, p.length);
            
            if(p.y > canvas.height) {
                particles.splice(i, 1);
                i--;
            }
        }
    }

    function updateUI() {
        scoreText.innerText = score;
        coinText.innerText = coinsCollected;
    }

    function gameOver() {
        gameActive = false;
        
        // En yüksek skoru kaydet
        if(score > highScore) {
            highScore = score;
            localStorage.setItem("subwayHighScore", highScore);
            highScoreText.innerText = highScore;
        }

        gameOverScreen.style.display = "block";
        finalScoreText.innerText = score;
        finalCoinsText.innerText = coinsCollected;
    }

    function resetGame() {
        entities = [];
        particles = [];
        score = 0;
        coinsCollected = 0;
        frames = 0;
        baseSpeed = 5;
        player.lane = 1;
        player.isJumping = false;
        gameActive = true;
        
        updateUI();
        gameOverScreen.style.display = "none";
        gameLoop();
    }

    // Ana Oyun Döngüsü
    function gameLoop() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawBackground();
        handleSpeedLines();
        spawnEntities();
        handleEntities();
        drawPlayer();

        frames++;
        
        // Sadece koşarak kazanılan pasif puan (Her 10 karede 1 puan)
        if (frames % 10 === 0) {
            score++;
            updateUI();
        }
        
        // Zamanla Hızı Artır
        if (frames % 400 === 0) {
            baseSpeed += 0.5;
        }

        requestAnimationFrame(gameLoop);
    }

    // Oyunu Başlat
    gameLoop();

</script>
</body>
</html>
