<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X O X - Zor Yapay Zeka</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: #171b2e;
      --panel-2: #111528;
      --text: #eef2ff;
      --muted: #aab3d3;
      --accent: #7c8cff;
      --accent-2: #4ce0b3;
      --danger: #ff6b6b;
      --cell: 62px;
      --gap: 8px;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(124,140,255,0.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(76,224,179,0.10), transparent 28%),
        var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .app {
      width: min(96vw, 980px);
      min-height: min(94vh, 920px);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 18px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
      backdrop-filter: blur(10px);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 36px);
      letter-spacing: 0.5px;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 4px;
      font-size: 14px;
    }

    .header-left { display: grid; gap: 4px; }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    select, button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      cursor: pointer;
      outline: none;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }

    select:hover, button:hover { transform: translateY(-1px); }
    button.primary {
      background: linear-gradient(135deg, rgba(124,140,255,0.28), rgba(76,224,179,0.24));
      border-color: rgba(124,140,255,0.45);
      font-weight: 700;
    }

    .status {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text);
      line-height: 1.4;
    }

    .board-wrap {
      display: grid;
      place-items: center;
      overflow: auto;
      padding: 6px;
    }

    .board {
      display: grid;
      gap: var(--gap);
      width: fit-content;
      max-width: 100%;
      max-height: 100%;
      touch-action: manipulation;
    }

    .cell {
      width: var(--cell);
      height: var(--cell);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: clamp(20px, 3vw, 32px);
      user-select: none;
      cursor: pointer;
      transition: transform .08s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
    }

    .cell:hover { transform: scale(1.03); background: rgba(255,255,255,0.08); }
    .cell.x { color: #ff7e7e; }
    .cell.o { color: #7ee7c5; }
    .cell.win { box-shadow: 0 0 0 2px rgba(76,224,179,0.6) inset, 0 0 22px rgba(76,224,179,0.18); }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
      align-items: center;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
    }

    @media (max-width: 700px) {
      :root { --gap: 6px; --cell: 52px; }
      .app { padding: 14px; border-radius: 22px; }
      .controls { justify-content: flex-start; }
    }

    @media (max-width: 420px) {
      :root { --gap: 5px; --cell: 42px; }
      select, button { padding: 10px 12px; border-radius: 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="header-left">
        <h1>X O X</h1>
        <div class="subtitle">Sen O’sun. Robot X ve çok zor oynar.</div>
      </div>
      <div class="controls">
        <select id="sizeSelect" aria-label="Tahta boyutu seç">
          <option value="3">3x3</option>
          <option value="9" selected>9x9</option>
          <option value="18">18x18</option>
        </select>
        <button id="restartBtn" class="primary">Yeni oyun</button>
      </div>
    </header>

    <div class="status" id="status">Hazır. Robot X başlıyor.</div>

    <div class="board-wrap">
      <div id="board" class="board" aria-label="Oyun tahtası"></div>
    </div>

    <div class="footer">
      <div class="pill">Amaç: Aynı sırada gerekli sayıyı ilk tamamlayan kazanır.</div>
      <div class="pill">X = Robot, O = Sen</div>
    </div>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const sizeSelect = document.getElementById('sizeSelect');
    const restartBtn = document.getElementById('restartBtn');

    let size = Number(sizeSelect.value);
    let winLength = getWinLength(size);
    let board = [];
    let gameOver = false;
    let currentPlayer = 'X';
    let aiThinking = false;

    function getWinLength(n) {
      if (n <= 3) return 3;
      if (n <= 9) return 5;
      return 5;
    }

    function resizeBoard() {
      const available = Math.min(window.innerWidth * 0.92, window.innerHeight * 0.62);
      const cell = Math.floor((available - (size - 1) * 6) / size);
      const finalCell = Math.max(24, Math.min(cell, size <= 3 ? 120 : 56));
      document.documentElement.style.setProperty('--cell', finalCell + 'px');
      document.documentElement.style.setProperty('--gap', size <= 3 ? '10px' : (size <= 9 ? '6px' : '4px'));
    }

    function newGame() {
      size = Number(sizeSelect.value);
      winLength = getWinLength(size);
      board = Array.from({ length: size }, () => Array(size).fill(''));
      gameOver = false;
      currentPlayer = 'X';
      aiThinking = false;
      buildBoard();
      resizeBoard();
      setStatus('Robot X başlıyor. Dikkatli ol.');
      setTimeout(aiMove, 250);
    }

    function buildBoard() {
      boardEl.innerHTML = '';
      boardEl.style.gridTemplateColumns = `repeat(${size}, var(--cell))`;
      boardEl.style.gridTemplateRows = `repeat(${size}, var(--cell))`;

      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const cell = document.createElement('button');
          cell.className = 'cell';
          cell.type = 'button';
          cell.dataset.r = r;
          cell.dataset.c = c;
          cell.setAttribute('aria-label', `${r + 1}. satır ${c + 1}. sütun`);
          cell.addEventListener('click', () => handleMove(r, c));
          boardEl.appendChild(cell);
        }
      }
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function handleMove(r, c) {
      if (gameOver || aiThinking) return;
      if (currentPlayer !== 'O') return;
      if (board[r][c]) return;

      placeMove(r, c, 'O');
      const result = checkGameEnd();
      if (result.done) return finishGame(result);

      currentPlayer = 'X';
      setStatus('Robot düşünüyor...');
      aiThinking = true;
      setTimeout(() => {
        aiMove();
      }, 180);
    }

    function placeMove(r, c, player) {
      board[r][c] = player;
      const cell = getCell(r, c);
      cell.textContent = player;
      cell.classList.add(player.toLowerCase());
    }

    function getCell(r, c) {
      return boardEl.children[r * size + c];
    }

    function aiMove() {
      if (gameOver) return;
      aiThinking = true;
      const move = chooseBestMove();
      if (move) {
        placeMove(move.r, move.c, 'X');
      }
      const result = checkGameEnd();
      if (result.done) {
        finishGame(result);
        aiThinking = false;
        return;
      }
      currentPlayer = 'O';
      aiThinking = false;
      setStatus('Senin sıra. O yerleştir.');
    }

    function finishGame(result) {
      gameOver = true;
      highlightWin(result.line);
      if (result.winner === 'X') setStatus('Robot X kazandı. Tekrar dene.');
      else if (result.winner === 'O') setStatus('Tebrikler! Sen kazandın.');
      else setStatus('Berabere.');
    }

    function highlightWin(line) {
      if (!line) return;
      for (const [r, c] of line) {
        getCell(r, c).classList.add('win');
      }
    }

    function checkGameEnd() {
      const xWin = findWinner('X');
      if (xWin) return { done: true, winner: 'X', line: xWin };
      const oWin = findWinner('O');
      if (oWin) return { done: true, winner: 'O', line: oWin };
      if (board.every(row => row.every(cell => cell))) return { done: true, winner: null, line: null };
      return { done: false };
    }

    function findWinner(player) {
      const dirs = [
        [0, 1],
        [1, 0],
        [1, 1],
        [1, -1]
      ];

      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (board[r][c] !== player) continue;
          for (const [dr, dc] of dirs) {
            const line = [[r, c]];
            let ok = true;
            for (let k = 1; k < winLength; k++) {
              const nr = r + dr * k;
              const nc = c + dc * k;
              if (nr < 0 || nc < 0 || nr >= size || nc >= size || board[nr][nc] !== player) {
                ok = false;
                break;
              }
              line.push([nr, nc]);
            }
            if (ok) return line;
          }
        }
      }
      return null;
    }

    function chooseBestMove() {
      const empties = [];
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (!board[r][c]) empties.push({ r, c });
        }
      }
      if (!empties.length) return null;

      // 1) Immediate win
      for (const move of empties) {
        board[move.r][move.c] = 'X';
        const win = findWinner('X');
        board[move.r][move.c] = '';
        if (win) return move;
      }

      // 2) Block immediate loss
      for (const move of empties) {
        board[move.r][move.c] = 'O';
        const win = findWinner('O');
        board[move.r][move.c] = '';
        if (win) return move;
      }

      // 3) Candidate moves near existing stones
      const candidates = getCandidateMoves(empties);
      let bestScore = -Infinity;
      let bestMoves = [];

      for (const move of candidates) {
        const score = evaluateMove(move.r, move.c);
        if (score > bestScore) {
          bestScore = score;
          bestMoves = [move];
        } else if (score === bestScore) {
          bestMoves.push(move);
        }
      }

      // prefer center-ish best move randomly among equals
      return bestMoves[Math.floor(Math.random() * bestMoves.length)];
    }

    function getCandidateMoves(empties) {
      if (empties.length === size * size) {
        return [{ r: Math.floor(size / 2), c: Math.floor(size / 2) }];
      }

      const set = new Map();
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (!board[r][c]) continue;
          for (let dr = -2; dr <= 2; dr++) {
            for (let dc = -2; dc <= 2; dc++) {
              const nr = r + dr;
              const nc = c + dc;
              if (nr < 0 || nc < 0 || nr >= size || nc >= size) continue;
              if (board[nr][nc]) continue;
              set.set(`${nr},${nc}`, { r: nr, c: nc });
            }
          }
        }
      }
      return [...set.values()];
    }

    function evaluateMove(r, c) {
      let score = 0;
      const center = (size - 1) / 2;
      const dist = Math.abs(r - center) + Math.abs(c - center);
      score += Math.max(0, (size * 2 - dist) * 2);

      const directions = [
        [0, 1],
        [1, 0],
        [1, 1],
        [1, -1]
      ];

      for (const [dr, dc] of directions) {
        score += linePotential(r, c, dr, dc, 'X') * 18;
        score += linePotential(r, c, dr, dc, 'O') * 21;
      }

      // create forks / avoid easy traps
      score += countOpenThreatsAfterMove(r, c, 'X') * 120;
      score += countOpenThreatsAfterMove(r, c, 'O') * 135;

      // slight randomness so it does not feel robotic in the same way every time
      score += Math.random() * 0.35;
      return score;
    }

    function linePotential(r, c, dr, dc, player) {
      // score line segments of length winLength that include (r,c)
      let total = 0;
      for (let offset = -(winLength - 1); offset <= 0; offset++) {
        let own = 0;
        let empty = 0;
        let blocked = false;
        for (let k = 0; k < winLength; k++) {
          const nr = r + (offset + k) * dr;
          const nc = c + (offset + k) * dc;
          if (nr < 0 || nc < 0 || nr >= size || nc >= size) { blocked = true; break; }
          const cell = (nr === r && nc === c) ? player : board[nr][nc];
          if (cell === player) own++;
          else if (!cell) empty++;
          else { blocked = true; break; }
        }
        if (!blocked) {
          if (own === winLength) total += 100000;
          else if (own === winLength - 1 && empty === 1) total += 5000;
          else if (own === winLength - 2 && empty === 2) total += 700;
          else if (own > 0) total += own * own * 25;
        }
      }
      return total;
    }

    function countOpenThreatsAfterMove(r, c, player) {
      board[r][c] = player;
      let threats = 0;
      const dirs = [[0,1],[1,0],[1,1],[1,-1]];
      for (const [dr, dc] of dirs) {
        for (let offset = -(winLength - 1); offset <= 0; offset++) {
          let pieces = 0;
          let blocked = false;
          let empties = 0;
          for (let k = 0; k < winLength; k++) {
            const nr = r + (offset + k) * dr;
            const nc = c + (offset + k) * dc;
            if (nr < 0 || nc < 0 || nr >= size || nc >= size) { blocked = true; break; }
            const cell = board[nr][nc];
            if (cell === player) pieces++;
            else if (!cell) empties++;
            else { blocked = true; break; }
          }
          if (!blocked && pieces === winLength - 1 && empties === 1) threats++;
          if (!blocked && pieces === winLength - 2 && empties === 2) threats += 0.25;
        }
      }
      board[r][c] = '';
      return threats;
    }

    window.addEventListener('resize', resizeBoard);
    sizeSelect.addEventListener('change', newGame);
    restartBtn.addEventListener('click', newGame);

    newGame();
  </script>
</body>
</html>
