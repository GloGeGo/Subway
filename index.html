<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Subway Surfers 2D - Mobil</title>
    <style>
        :root {
            --bg1: #16213e;
            --bg2: #0f3460;
            --accent: #e94560;
            --accent2: #ff6b81;
            --panel: rgba(22, 33, 62, 0.96);
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: min(96vw, 360px);
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 360 / 600;
            background: linear-gradient(to bottom, var(--bg1) 0%, var(--bg2) 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 10px;
            border: 4px solid var(--accent);
            touch-action: none;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            pointer-events: none;
            font-size: 16px;
        }
        .stats {
            margin: 4px 0;
            line-height: 1.2;
        }
        .gold { color: #f1c40f; }
        #game-over {
            position: absolute;
            inset: 50% auto auto 50%;
            transform: translate(-50%, -50%);
            background: var(--panel);
            color: white;
            padding: 24px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px var(--accent);
            width: min(82vw, 300px);
            box-sizing: border-box;
        }
        button {
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.12s ease, background-color 0.12s ease, opacity 0.12s ease;
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            transform: scale(0.96);
            opacity: 0.92;
        }
        #game-over button {
            margin-top: 14px;
            padding: 12px 22px;
            font-size: 16px;
            font-weight: bold;
            background: var(--accent);
            color: white;
        }
        #controls {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 10px;
            display: flex;
            gap: 12px;
            z-index: 5;
            pointer-events: auto;
        }
        .control-btn {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: white;
            background: rgba(233, 69, 96, 0.92);
            box-shadow: 0 8px 18px rgba(0,0,0,0.35);
            border: 2px solid rgba(255,255,255,0.14);
        }
        .control-btn:active {
            background: var(--accent2);
        }
        .hint {
            margin-top: 8px;
            font-size: 12px;
            color: #cfd8dc;
            opacity: 0.9;
        }
        @media (max-width: 420px) {
            #ui-layer { font-size: 14px; }
            .control-btn { width: 66px; height: 66px; font-size: 26px; }
            #controls { gap: 10px; bottom: 8px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="360" height="600"></canvas>

    <div id="ui-layer">
        <div class="stats">Skor: <span id="scoreText">0</span></div>
        <div class="stats gold">Altın: <span id="coinText">0</span></div>
        <div class="stats" style="font-size:14px; color:#bdc3c7;">En Yüksek: <span id="highScoreText">0</span></div>
        <div class="hint">Re-Tica Surfers</div>
    </div>

    <div id="controls" aria-label="Mobil Kontroller">
        <button class="control-btn" id="leftBtn" aria-label="Sola git">◀</button>
        <button class="control-btn" id="jumpBtn" aria-label="Zıpla">▲</button>
        <button class="control-btn" id="rightBtn" aria-label="Sağa git">▶</button>
    </div>

    <div id="game-over">
        <h1 style="margin-top:0; color:#e94560;">YAKALANDIN!</h1>
        <p class="stats">Skor: <span id="final-score">0</span></p>
        <p class="stats gold">Toplanan Altın: <span id="final-coins">0</span></p>
        <button id="restartBtn">Tekrar Koş!</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const gameOverScreen = document.getElementById("game-over");
    const scoreText = document.getElementById("scoreText");
    const coinText = document.getElementById("coinText");
    const highScoreText = document.getElementById("highScoreText");
    const finalScoreText = document.getElementById("final-score");
    const finalCoinsText = document.getElementById("final-coins");
    const restartBtn = document.getElementById("restartBtn");

    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");
    const jumpBtn = document.getElementById("jumpBtn");

    let frames = 0;
    let score = 0;
    let coinsCollected = 0;
    let highScore = Number(localStorage.getItem("subwayHighScore") || 0);
    highScoreText.innerText = highScore;

    let gameActive = true;
    let baseSpeed = 5;
    let trackOffset = 0;
    const lanes = [60, 180, 300];

    const player = {
        lane: 1,
        y: 480,
        width: 40,
        height: 50,
        color: "#00d2d3",
        isJumping: false,
        jumpTimer: 0,
        jumpDuration: 40,
        scale: 1
    };

    let entities = [];
    let particles = [];
    let rafId = null;

    function moveLeft() {
        if (!gameActive) return;
        if (player.lane > 0) player.lane--;
    }
    function moveRight() {
        if (!gameActive) return;
        if (player.lane < 2) player.lane++;
    }
    function jump() {
        if (!gameActive) return;
        if (!player.isJumping) {
            player.isJumping = true;
            player.jumpTimer = 0;
        }
    }

    document.addEventListener("keydown", function(event) {
        if (!gameActive) {
            if(event.key === "Enter" || event.key === " ") resetGame();
            return;
        }

        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") moveLeft();
        if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") moveRight();
        if (event.key === "ArrowUp" || event.key === "w" || event.key === "W" || event.key === " ") jump();
    });

    function bindTouchButton(button, action) {
        const handler = (e) => {
            e.preventDefault();
            if (e.pointerType === "mouse" && e.type === "pointerdown" && e.button !== 0) return;
            action();
        };
        button.style.touchAction = "manipulation";
        button.addEventListener("pointerdown", handler, { passive: false });
    }

    bindTouchButton(leftBtn, moveLeft);
    bindTouchButton(rightBtn, moveRight);
    bindTouchButton(jumpBtn, jump);
    restartBtn.addEventListener("click", resetGame);

    function spawnEntities() {
        const spawnRate = Math.max(30, 70 - Math.floor(score / 200));
        if (frames % spawnRate === 0) {
            const randomLane = Math.floor(Math.random() * 3);
            const entityType = Math.random();

            if (entityType < 0.3) {
                entities.push({ type: "train", lane: randomLane, y: -150, width: 60, height: 150, color: "#ff4757" });
            } else if (entityType < 0.6) {
                entities.push({ type: "barrier", lane: randomLane, y: -40, width: 50, height: 20, color: "#ffa502" });
            } else {
                for(let i = 0; i < 3; i++) {
                    entities.push({ type: "coin", lane: randomLane, y: -40 - (i * 40), radius: 12, color: "#f1c40f", collected: false });
                }
            }
        }
    }

    function drawBackground() {
        trackOffset = (trackOffset + baseSpeed) % 40;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
        ctx.lineWidth = 4;

        for(let i = 0; i < 3; i++) {
            const x = lanes[i];
            ctx.beginPath(); ctx.moveTo(x - 25, 0); ctx.lineTo(x - 25, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x + 25, 0); ctx.lineTo(x + 25, canvas.height); ctx.stroke();

            for(let y = trackOffset; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(x - 25, y);
                ctx.lineTo(x + 25, y);
                ctx.stroke();
            }
        }
    }

    function drawPlayer() {
        let currentWidth = player.width;
        let currentHeight = player.height;
        let yOffset = 0;
        player.scale = 1;

        if (player.isJumping) {
            player.jumpTimer++;
            const jumpProgress = (player.jumpTimer / player.jumpDuration) * Math.PI;
            const heightBoost = Math.sin(jumpProgress);
            player.scale = 1 + (heightBoost * 0.4);
            yOffset = heightBoost * -40;

            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.beginPath();
            ctx.ellipse(lanes[player.lane], player.y + player.height - 10, 20 * (1 - heightBoost * 0.5), 8, 0, 0, Math.PI * 2);
            ctx.fill();

            if (player.jumpTimer >= player.jumpDuration) {
                player.isJumping = false;
                player.scale = 1;
            }
        }

        currentWidth *= player.scale;
        currentHeight *= player.scale;
        const drawX = lanes[player.lane] - (currentWidth / 2);

        ctx.fillStyle = player.color;
        ctx.shadowBlur = player.isJumping ? 20 : 10;
        ctx.shadowColor = player.color;
        ctx.fillRect(drawX, player.y + yOffset, currentWidth, currentHeight);
        ctx.shadowBlur = 0;
    }

    function handleEntities() {
        for (let i = 0; i < entities.length; i++) {
            const ent = entities[i];
            ent.y += baseSpeed;

            if (ent.type === "coin" && !ent.collected) {
                ctx.fillStyle = ent.color;
                ctx.beginPath();
                ctx.arc(lanes[ent.lane], ent.y, ent.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "#f39c12";
                ctx.beginPath();
                ctx.arc(lanes[ent.lane], ent.y, ent.radius - 4, 0, Math.PI * 2);
                ctx.fill();
            } else if (ent.type === "train" || ent.type === "barrier") {
                const x = lanes[ent.lane] - (ent.width / 2);
                ctx.fillStyle = ent.color;
                ctx.fillRect(x, ent.y, ent.width, ent.height);

                ctx.fillStyle = "rgba(0,0,0,0.2)";
                if(ent.type === "barrier") {
                    ctx.fillRect(x, ent.y + 5, ent.width, 10);
                } else {
                    ctx.fillRect(x + 10, ent.y, 40, ent.height);
                }
            }

            const isSameLane = (player.lane === ent.lane);
            const isOverlappingY = (player.y < ent.y + (ent.radius || ent.height) && player.y + player.height > ent.y);

            if (isSameLane && isOverlappingY) {
                if (ent.type === "coin" && !ent.collected) {
                    ent.collected = true;
                    score += 50;
                    coinsCollected++;
                    updateUI();
                } else if (ent.type === "train") {
                    gameOver();
                } else if (ent.type === "barrier") {
                    if (!player.isJumping) gameOver();
                }
            }

            if (ent.y > canvas.height) {
                entities.splice(i, 1);
                i--;
            }
        }
    }

    function handleSpeedLines() {
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        if (Math.random() < 0.3) {
            particles.push({
                x: Math.random() > 0.5 ? Math.random() * 40 : canvas.width - Math.random() * 40,
                y: -20,
                length: 20 + Math.random() * 50
            });
        }

        for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            p.y += baseSpeed * 2;
            ctx.fillRect(p.x, p.y, 2, p.length);
            if (p.y > canvas.height) {
                particles.splice(i, 1);
                i--;
            }
        }
    }

    function updateUI() {
        scoreText.innerText = score;
        coinText.innerText = coinsCollected;
    }

    function gameOver() {
        if (!gameActive) return;
        gameActive = false;
        if (rafId) cancelAnimationFrame(rafId);

        if (score > highScore) {
            highScore = score;
            localStorage.setItem("subwayHighScore", String(highScore));
            highScoreText.innerText = highScore;
        }

        gameOverScreen.style.display = "block";
        finalScoreText.innerText = score;
        finalCoinsText.innerText = coinsCollected;
    }

    function resetGame() {
        entities = [];
        particles = [];
        score = 0;
        coinsCollected = 0;
        frames = 0;
        baseSpeed = 5;
        player.lane = 1;
        player.isJumping = false;
        player.jumpTimer = 0;
        gameActive = true;
        updateUI();
        gameOverScreen.style.display = "none";
        if (rafId) cancelAnimationFrame(rafId);
        gameLoop();
    }

    function gameLoop() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        handleSpeedLines();
        spawnEntities();
        handleEntities();
        drawPlayer();

        frames++;
        if (frames % 10 === 0) {
            score++;
            updateUI();
        }
        if (frames % 400 === 0) {
            baseSpeed += 0.5;
        }

        rafId = requestAnimationFrame(gameLoop);
    }

    updateUI();
    gameLoop();
</script>
</body>
</html>
